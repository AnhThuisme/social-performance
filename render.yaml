services:
  - type: web
    name: social-performance
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /healthz
    plan: free
    envVars:
      - key: AUTH_BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_SHEET_ID
        sync: false
      - key: DEFAULT_SHEET_NAME
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GMAIL_SMTP_EMAIL
        sync: false
      - key: GMAIL_SMTP_APP_PASSWORD
        sync: false
      - key: GMAIL_SMTP_FROM_EMAIL
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
